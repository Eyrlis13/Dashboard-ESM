name: Déploiement du dashboard (GitHub Pages)

# Publie automatiquement le dashboard à chaque mise à jour de la branche principale.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration Pages
        uses: actions/configure-pages@v5

      - name: Empaquetage du site (racine du dépôt)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Déploiement
        id: deployment
        uses: actions/deploy-pages@v4
